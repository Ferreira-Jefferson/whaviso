# whaviso: site nginx.
# Instalar em /etc/nginx/sites-available/whaviso.conf e linkar em sites-enabled/.
#
# Topologia (Cloudflare na frente, SSL Full strict):
#   navegador -> Cloudflare (TLS de borda, esconde o IP) -> nginx :443 (cert de origem)
#   whaviso.com            -> SPA estatica (/var/www/whaviso)
#   api.whaviso.com        -> proxy 127.0.0.1:3001 (api REST)
#   www.* e *.com.br       -> 301 para https://whaviso.com
#
# O zap (:3002) NAO e exposto: fica so no firewall interno. So habilite um vhost
# para ele quando ligar o OTP por telefone (ver deploy/README.md, apendice OTP).

# Certificado de ORIGEM da Cloudflare (criado no painel: SSL/TLS > Origin Server).
# Um unico cert cobrindo: whaviso.com, *.whaviso.com, whaviso.com.br, *.whaviso.com.br
ssl_certificate     /etc/ssl/cloudflare/whaviso-origin.pem;
ssl_certificate_key /etc/ssl/cloudflare/whaviso-origin.key;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;

# Authenticated Origin Pulls (opcional, recomendado): so a Cloudflare consegue
# falar com a origem. Baixe o CA em https://developers.cloudflare.com/ssl/origin-configuration/authenticated-origin-pull/
# e descomente as 2 linhas abaixo (e ative o recurso no painel da Cloudflare).
# ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
# ssl_verify_client on;

# Porta 80: a Cloudflare conecta na origem por 443 (Full strict); o 80 so redireciona.
server {
    listen 80;
    listen [::]:80;
    server_name whaviso.com www.whaviso.com whaviso.com.br www.whaviso.com.br;
    return 301 https://whaviso.com$request_uri;
}

# ── SPA: whaviso.com (canonico) ─────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name whaviso.com;

    root /var/www/whaviso;
    index index.html;

    # Cabecalhos de seguranca
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP base para SPA Vite + Supabase. VALIDE no navegador apos o 1o deploy:
    # se a SPA nao carregar, relaxe script-src (adicione o hash do inline da Vite
    # ou, em ultimo caso, 'unsafe-inline'). connect-src cobre a api e o Supabase.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.whaviso.com https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # index.html nunca em cache: garante que o usuario pega a build nova
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # assets com hash no nome: cache longo e imutavel
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # rota de SPA: tudo que nao for arquivo cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── api: api.whaviso.com -> 127.0.0.1:3001 ──────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.whaviso.com;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # corpo de request modesto (a api so recebe JSON pequeno)
    client_max_body_size 1m;

    location / {
        limit_req zone=whaviso_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}

# ── Redirects para o canonico (www e .com.br) ───────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.whaviso.com whaviso.com.br www.whaviso.com.br;
    return 301 https://whaviso.com$request_uri;
}
