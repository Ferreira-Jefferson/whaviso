# whaviso: site nginx.
# Instalar em /etc/nginx/sites-available/whaviso.conf e linkar em sites-enabled/.
#
# Topologia (Cloudflare na frente, SSL Full strict):
#   navegador -> Cloudflare (TLS de borda, esconde o IP) -> nginx :443 (cert de origem)
#   whaviso.com            -> SPA estatica (/var/www/whaviso)
#   api.whaviso.com        -> proxy 127.0.0.1:3001 (api REST); /hooks/ -> 127.0.0.1:3002 (zap)
#   www.* e *.com.br       -> 301 para https://whaviso.com
#
# O zap (:3002) so e exposto no path /hooks/ (sob api.whaviso.com), para o Send SMS
# Hook do Supabase (nuvem) entregar o OTP por WhatsApp. O resto do zap fica so no
# firewall interno. Ver deploy/README.md, apendice OTP.

# Certificado de ORIGEM da Cloudflare (criado no painel: SSL/TLS > Origin Server).
# Um unico cert cobrindo: whaviso.com, *.whaviso.com, whaviso.com.br, *.whaviso.com.br
ssl_certificate     /etc/ssl/cloudflare/whaviso-origin.pem;
ssl_certificate_key /etc/ssl/cloudflare/whaviso-origin.key;
# Protocolos, ciphers e cache de sessao ficam no http{} do /etc/nginx/nginx.conf
# (padrao do Ubuntu); duplicar aqui daria erro de diretiva. So a Cloudflare fala
# com a origem (ufw trava 443 nas faixas dela), entao o TLS que importa para o
# usuario e o de borda, ja em 1.2+ no painel da Cloudflare.

# Authenticated Origin Pulls (opcional, recomendado): so a Cloudflare consegue
# falar com a origem. Baixe o CA em https://developers.cloudflare.com/ssl/origin-configuration/authenticated-origin-pull/
# e descomente as 2 linhas abaixo (e ative o recurso no painel da Cloudflare).
# ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
# ssl_verify_client on;

# Porta 80: a Cloudflare conecta na origem por 443 (Full strict); o 80 so redireciona.
server {
    listen 80;
    listen [::]:80;
    server_name whaviso.com www.whaviso.com whaviso.com.br www.whaviso.com.br;
    return 301 https://whaviso.com$request_uri;
}

# ── SPA: whaviso.com (canonico) ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name whaviso.com;

    root /var/www/whaviso;
    index index.html;

    # Cabecalhos de seguranca
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP da SPA (Vite + Supabase + login Google). As origens do Google Identity
    # Services (GIS) sao explicitas: script-src, frame-src e connect-src incluem
    # https://accounts.google.com (a SPA carrega gsi/client, renderiza o iframe do
    # botao e chama o mesmo dominio). NAO use 'unsafe-inline' em script-src: destroi
    # a defesa anti-XSS. Se o modulepreload inline da Vite for bloqueado, resolva no
    # build (modulePreload.polyfill = false no frontend) ou por hash, nunca afrouxando
    # aqui. object-src 'none' remove <object>/<embed> legados. VALIDE no navegador
    # (DevTools > Console) apos o 1o deploy e confirme que o login Google funciona.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.whaviso.com https://*.supabase.co wss://*.supabase.co https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # index.html nunca em cache: garante que o usuario pega a build nova
    # add_header aqui NAO herda os add_header do server{} (regra do nginx: uma
    # location que declara o proprio add_header cancela a heranca do nivel pai).
    # Como toda rota da SPA cai em /index.html via try_files, repetir os headers
    # de seguranca aqui e o unico jeito de eles chegarem numa resposta real.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.whaviso.com https://*.supabase.co wss://*.supabase.co https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # assets com hash no nome: cache longo e imutavel
    # mesmo motivo do bloco acima: precisa repetir os headers de seguranca.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.whaviso.com https://*.supabase.co wss://*.supabase.co https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # rota de SPA: tudo que nao for arquivo cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── api: api.whaviso.com -> 127.0.0.1:3001 ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.whaviso.com;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # corpo de request modesto (a api so recebe JSON pequeno)
    client_max_body_size 1m;

    # Send SMS Hook do Supabase (OTP por WhatsApp): /hooks/ vai pro zap (:3002), nao
    # pro api. Webhook server-to-server (nuvem do Supabase -> zap), validado por HMAC
    # no proprio zap; o frontend nunca chama isto. nginx casa o prefixo mais especifico,
    # entao /hooks/send-code cai aqui e o resto segue pro :3001.
    location /hooks/ {
        limit_req zone=whaviso_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # Webhook do WhatsApp (Meta Cloud API): inbound de eventos (botoes do devedor,
    # status de entrega, handshake) vai pro zap (:3002), nao pro api. O zap valida a
    # assinatura X-Hub-Signature-256 (HMAC do corpo cru) e responde o handshake do
    # GET com o hub.challenge. Body limite pequeno (a Meta manda JSON enxuto) e rate
    # limit proprio. Endpoint protegido pela assinatura, nao por auth de usuario (o
    # frontend nunca chama isto). ATIVO: o webhook esta cadastrado no painel da Meta
    # apontando para https://api.whaviso.com/webhook/whatsapp. Ao aplicar no VPS:
    # nginx -t && systemctl reload nginx.
    location /webhook/ {
        limit_req zone=whaviso_api burst=20 nodelay;
        client_max_body_size 128k;
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=whaviso_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}

# ── Redirects para o canonico (www e .com.br) ───────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.whaviso.com whaviso.com.br www.whaviso.com.br;
    return 301 https://whaviso.com$request_uri;
}
